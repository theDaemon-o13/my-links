<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ссылки гостей — И & Ф</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f5f0;--card:#fff;--emerald:#1a5c52;--emerald-dark:#0e3d35;
  --gold:#c9a84c;--text:#2c2c2c;--text2:#6b6b6b;--border:#e8e8e4;
  --ok:#27ae60;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  padding-bottom:80px;
  -webkit-text-size-adjust:100%;
}

/* Header */
.header{
  position:sticky;top:0;z-index:100;
  background:var(--emerald-dark);
  padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
}
.header-title{color:#fff;font-size:1.1rem;font-weight:600}
.header-count{
  background:rgba(255,255,255,.15);
  color:var(--gold);font-size:.75rem;font-weight:600;
  padding:4px 12px;border-radius:20px;
}

/* Search */
.search-wrap{
  position:sticky;top:54px;z-index:99;
  background:var(--bg);padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.search-input{
  width:100%;
  padding:12px 16px 12px 42px;
  border:1.5px solid var(--border);
  border-radius:12px;
  font-size:1rem;
  background:var(--card);
  color:var(--text);
  outline:none;
  transition:border-color .2s;
}
.search-input:focus{border-color:var(--emerald)}
.search-icon{
  position:absolute;left:30px;top:50%;transform:translateY(-50%);
  color:var(--text2);font-size:1.1rem;pointer-events:none;
}

/* Table group */
.table-group{margin:12px 16px}
.table-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 0 8px;
  position:sticky;top:120px;
  background:var(--bg);z-index:10;
}
.table-badge{
  background:var(--emerald);color:#fff;
  font-size:.7rem;font-weight:700;letter-spacing:.5px;
  padding:5px 12px;border-radius:20px;
  white-space:nowrap;
}
.table-desc{
  font-size:.8rem;color:var(--text2);font-weight:500;
}
.table-line{flex:1;height:1px;background:var(--border)}

/* Guest row */
.guest-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  margin-bottom:8px;
  padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  transition:transform .15s,box-shadow .15s;
  -webkit-tap-highlight-color:transparent;
}
.guest-card:active{transform:scale(.98);box-shadow:0 2px 8px rgba(0,0,0,.06)}

.guest-num{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--emerald-dark),var(--emerald));
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--gold);font-weight:700;font-size:.85rem;
  flex-shrink:0;
}

.guest-info{flex:1;min-width:0}
.guest-name{font-size:.95rem;font-weight:600;color:var(--text)}
.guest-link{
  font-size:.7rem;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-top:2px;
}

.copy-btn{
  flex-shrink:0;
  background:var(--emerald);color:#fff;
  border:none;border-radius:10px;
  padding:10px 16px;
  font-size:.78rem;font-weight:600;
  cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
  white-space:nowrap;
  min-width:80px;
  text-align:center;
}
.copy-btn:active{transform:scale(.94);background:var(--emerald-dark)}
.copy-btn.copied{background:var(--ok)}

/* Copy all */
.copy-all-wrap{
  padding:12px 16px;
}
.copy-all-btn{
  width:100%;
  background:var(--emerald-dark);color:#fff;
  border:none;border-radius:12px;
  padding:14px;
  font-size:.85rem;font-weight:600;
  cursor:pointer;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.copy-all-btn:active{transform:scale(.98);opacity:.85}
.copy-all-btn.copied{background:var(--ok)}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--emerald-dark);color:#fff;
  padding:12px 28px;border-radius:30px;
  font-size:.85rem;font-weight:500;
  box-shadow:0 8px 30px rgba(0,0,0,.2);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  opacity:0;z-index:200;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Empty search */
.no-results{
  text-align:center;padding:40px 20px;
  color:var(--text2);font-size:.9rem;
}

/* Hide */
.hidden{display:none!important}

/* Thanks generator */
.thanks-section{
  margin:20px 16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  position:relative;
  overflow:hidden;
}
.thanks-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--emerald),var(--gold));
}
.thanks-title{
  font-size:.95rem;font-weight:700;color:var(--emerald-dark);
  margin-bottom:4px;display:flex;align-items:center;gap:8px;
}
.thanks-subtitle{font-size:.78rem;color:var(--text2);margin-bottom:16px}
.thanks-row{display:flex;gap:10px}
.thanks-input{
  flex:1;padding:13px 16px;
  border:1.5px solid var(--border);border-radius:12px;
  font-size:1rem;background:var(--bg);color:var(--text);
  outline:none;transition:border-color .2s;
}
.thanks-input:focus{border-color:var(--emerald)}
.thanks-input::placeholder{color:#aaa}
.thanks-gen-btn{
  flex-shrink:0;
  background:var(--gold);color:#fff;
  border:none;border-radius:12px;
  padding:13px 20px;font-size:.8rem;font-weight:700;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.thanks-gen-btn:active{transform:scale(.95);opacity:.85}
.thanks-result{
  margin-top:14px;display:none;
  background:var(--bg);border-radius:12px;
  padding:14px;
}
.thanks-result.show{display:block}
.thanks-result-link{
  font-size:.8rem;color:var(--emerald);
  word-break:break-all;line-height:1.5;
  margin-bottom:10px;
}
.thanks-copy-btn{
  width:100%;
  background:var(--emerald);color:#fff;
  border:none;border-radius:10px;
  padding:12px;font-size:.85rem;font-weight:600;
  cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.thanks-copy-btn:active{transform:scale(.97)}
.thanks-copy-btn.copied{background:var(--ok)}

@media(min-width:500px){
  body{max-width:500px;margin:0 auto}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">И & Ф · Гости</div>
  <div class="header-count" id="totalCount"></div>
</div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-input" id="search" type="text" placeholder="Поиск по имени...">
</div>

<div id="list"></div>

<!-- Thanks generator -->
<div class="thanks-section">
  <div class="thanks-title">🤍 Благодарственное письмо</div>
  <div class="thanks-subtitle">Введите имя — получите ссылку на открытку благодарности</div>
  <div class="thanks-row">
    <input class="thanks-input" id="thanksName" type="text" placeholder="Имя получателя...">
    <button class="thanks-gen-btn" onclick="generateThanks()">Получить</button>
  </div>
  <div class="thanks-result" id="thanksResult">
    <div class="thanks-result-link" id="thanksLink"></div>
    <button class="thanks-copy-btn" id="thanksCopyBtn" onclick="copyThanksLink()">Копировать ссылку</button>
  </div>
</div>

<div class="toast" id="toast">Ссылка скопирована ✓</div>

<script>
const DOMAIN = 'wedding-cards.org';

const DATA = [
  { table:1, label:'Коллеги', guests:['Шавкат','Рачаб','Равшан','Сино','Далер','Диловар','Фирдавс','Шабнам','Санам','Мансур','Мухаммадисо','Александр','Юсуф'] },
  { table:2, label:'Одноклассники', guests:['Чахон','Малика','Фирдавс','Комрон','Шерзод','Фаридун','Дилшод','Зулайхо','Абдуазиз','Комрон'] },
  { table:3, label:'Подруги', guests:['Умеда','Манижа','Мавзуна','Назира','Рухшона'] },
  { table:4, label:'Родст. Искандар', guests:['Анастасия','Кобил','Шарифа','Чахоноро','Фарангис','Дильшод','Нушофарин','Гурдофарид'] },
  { table:5, label:'Родст. Искандар', guests:['Татьяна','Нигина','Рустам','Шокирчон','Гулриз','Муяссар','Венера'] },
  { table:6, label:'Родст. Фары', guests:['Суман','Азиза','Мавзуна','Саида','Дочка','Биби','Бону','Парвиза','Парвина','Хуршеда'] },
  { table:7, label:'Родст. Фары', guests:['Гулчехра','Мичгона','Малика','Тахмина','Мадина','Равшаной','Мадина','Фахима'] },
  { table:8, label:'Кобил и друзья', guests:['Кобилчон','Хусрав','Шохин','Манучехр','Джахонгир'] },
];

function getLink(name, table){
  return `https://${DOMAIN}/#${name}/${table}`;
}

let totalGuests = 0;
DATA.forEach(g => totalGuests += g.guests.length);
document.getElementById('totalCount').textContent = totalGuests + ' гостей';

function render(filter=''){
  const list = document.getElementById('list');
  list.innerHTML = '';
  const q = filter.toLowerCase().trim();
  let found = 0;

  DATA.forEach(group => {
    const filtered = group.guests.filter(n => !q || n.toLowerCase().includes(q));
    if(!filtered.length) return;
    found += filtered.length;

    const section = document.createElement('div');
    section.className = 'table-group';
    section.innerHTML = `
      <div class="table-header">
        <span class="table-badge">Стол ${group.table}</span>
        <span class="table-desc">${group.label}</span>
        <div class="table-line"></div>
      </div>
    `;

    filtered.forEach(name => {
      const link = getLink(name, group.table);
      const card = document.createElement('div');
      card.className = 'guest-card';
      card.innerHTML = `
        <div class="guest-num">${group.table}</div>
        <div class="guest-info">
          <div class="guest-name">${name}</div>
          <div class="guest-link">${link}</div>
        </div>
        <button class="copy-btn" onclick="copyLink(this,'${link}')">Копировать</button>
      `;
      section.appendChild(card);
    });

    // Copy all for table
    const allLinks = filtered.map(n => `${n}: ${getLink(n, group.table)}`).join('\n');
    const copyAllDiv = document.createElement('div');
    copyAllDiv.className = 'copy-all-wrap';
    copyAllDiv.innerHTML = `<button class="copy-all-btn" onclick="copyAll(this,\`${allLinks.replace(/`/g,'\\`')}\`)">Копировать весь стол ${group.table}</button>`;
    section.appendChild(copyAllDiv);

    list.appendChild(section);
  });

  if(!found){
    list.innerHTML = '<div class="no-results">Никого не найдено</div>';
  }
}

function copyLink(btn, link){
  navigator.clipboard.writeText(link).then(()=>{
    btn.textContent = '✓';
    btn.classList.add('copied');
    showToast('Ссылка скопирована ✓');
    setTimeout(()=>{btn.textContent='Копировать';btn.classList.remove('copied')},1500);
  }).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');
    ta.value=link;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='✓';btn.classList.add('copied');
    showToast('Ссылка скопирована ✓');
    setTimeout(()=>{btn.textContent='Копировать';btn.classList.remove('copied')},1500);
  });
}

function copyAll(btn, text){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.textContent;
    btn.textContent='Скопировано ✓';
    btn.classList.add('copied');
    showToast('Все ссылки стола скопированы ✓');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied')},2000);
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    const orig=btn.textContent;
    btn.textContent='Скопировано ✓';btn.classList.add('copied');
    showToast('Все ссылки стола скопированы ✓');
    setTimeout(()=>{btn.textContent=orig;btn.classList.remove('copied')},2000);
  });
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));

render();

/* ── Thanks link generator (Cyrillic) ── */
let currentThanksLink = '';

function generateThanks(){
  const name = document.getElementById('thanksName').value.trim();
  if(!name){showToast('Введите имя');return}
  currentThanksLink = `https://${DOMAIN}/thanks.html#${name.replace(/ /g,'+')}`;
  document.getElementById('thanksLink').textContent = currentThanksLink;
  document.getElementById('thanksResult').classList.add('show');
}

function copyThanksLink(){
  const btn = document.getElementById('thanksCopyBtn');
  navigator.clipboard.writeText(currentThanksLink).then(()=>{
    btn.textContent='Скопировано ✓';btn.classList.add('copied');
    showToast('Ссылка скопирована ✓');
    setTimeout(()=>{btn.textContent='Копировать ссылку';btn.classList.remove('copied')},1500);
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=currentThanksLink;document.body.appendChild(ta);
    ta.select();document.execCommand('copy');document.body.removeChild(ta);
    btn.textContent='Скопировано ✓';btn.classList.add('copied');
    showToast('Ссылка скопирована ✓');
    setTimeout(()=>{btn.textContent='Копировать ссылку';btn.classList.remove('copied')},1500);
  });
}

document.getElementById('thanksName').addEventListener('keydown', e => {if(e.key==='Enter')generateThanks()});
</script>
</body>
</html>
